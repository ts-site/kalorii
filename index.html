<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food AI Chat</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#101010;color:white;font-family:Arial,sans-serif}
.app{max-width:620px;margin:0 auto;min-height:100vh;padding:14px}
.card{background:#1c1c1c;border-radius:22px;padding:16px;margin-bottom:14px}
h1,h2{margin:0 0 12px}
input,select,button,textarea{width:100%;padding:13px;margin-top:9px;border:none;border-radius:14px;font-size:16px}
textarea{min-height:56px;resize:none;font-family:Arial,sans-serif}
button{background:#7c5cff;color:white;font-weight:bold;cursor:pointer}
button:active{transform:scale(.98)}
.result{margin-top:12px;background:#2a2a2a;border-radius:14px;padding:13px;white-space:pre-wrap;line-height:1.45}
.chat{height:420px;overflow-y:auto;background:#141414;border-radius:18px;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:12px;border-radius:16px;line-height:1.4;white-space:pre-wrap;word-wrap:break-word}
.user{align-self:flex-end;background:#7c5cff}
.ai{align-self:flex-start;background:#2a2a2a}
.preview{max-width:180px;border-radius:12px;margin-top:8px;display:block}
.small{font-size:13px;color:#aaa;line-height:1.35}
</style>
</head>
<body>
<div class="app">

<div class="card">
<h1>🔥 Food AI Chat</h1>
<p class="small">Вставь API key в код файла в строку OPENROUTER_API_KEY.</p>
</div>

<div class="card">
<h2>Калькулятор дефицита</h2>
<input id="age" type="number" placeholder="Возраст">
<input id="height" type="number" placeholder="Рост, см">
<input id="weight" type="number" placeholder="Вес, кг">
<select id="gender">
<option value="male">Парень</option>
<option value="female">Девушка</option>
</select>
<select id="activity">
<option value="1.2">Мало активности</option>
<option value="1.375">Лёгкая активность</option>
<option value="1.55">Средняя активность</option>
<option value="1.725">Высокая активность</option>
</select>
<input id="eat" type="number" placeholder="Сколько ккал хочешь есть в день">
<button onclick="calc()">Посчитать</button>
<div id="calcResult" class="result">Заполни данные</div>
</div>

<div class="card">
<h2>💬 Чат с ИИ</h2>
<div id="chat" class="chat">
<div class="msg ai">Привет. Скинь фото еды или спроси что-нибудь про калории, белок, дефицит или рацион.</div>
</div>
<input id="photo" type="file" accept="image/*">
<textarea id="userText" placeholder="Напиши вопрос... Например: сколько тут калорий?"></textarea>
<button onclick="sendMessage()">Отправить</button>
<button onclick="clearChat()" style="background:#333;margin-top:8px;">Очистить чат</button>
</div>

</div>

<script>
const OPENROUTER_API_KEY = "ВСТАВЬ_СЮДА_API_KEY";
const MODEL = "openai/gpt-4o-mini";

let chatHistory = [
  {
    role:"system",
    content:
`Ты Food AI помощник.
Ты помогаешь считать калории, белки, жиры, углеводы по фото и по описанию.
Отвечай по-русски, кратко, понятно.
Если оцениваешь еду по фото, всегда говори, что это примерная оценка.
Не поддерживай опасные голодовки, экстремальные диеты и питание ниже безопасного уровня.
Если пользователь говорит про 600 ккал, голодание, срывы или сильную тревогу о весе — мягко советуй более безопасный дефицит и при необходимости поговорить со взрослым/врачом.`
  }
];

function calc(){
  const age = +document.getElementById("age").value;
  const h = +document.getElementById("height").value;
  const w = +document.getElementById("weight").value;
  const gender = document.getElementById("gender").value;
  const act = +document.getElementById("activity").value;
  const eat = +document.getElementById("eat").value;

  if(!age || !h || !w || !eat){
    alert("Заполни все поля");
    return;
  }

  const bmr = gender === "male"
    ? 10*w + 6.25*h - 5*age + 5
    : 10*w + 6.25*h - 5*age - 161;

  const norm = bmr * act;
  const deficit = norm - eat;
  const week = deficit * 7 / 7700;
  const month = deficit * 30 / 7700;

  let text =
`Базовый обмен: ${Math.round(bmr)} ккал

Норма: ${Math.round(norm)} ккал

Ты ешь: ${eat} ккал

Дефицит: ${Math.round(deficit)} ккал/день

Примерно жира:
За неделю: ${week.toFixed(2)} кг
За месяц: ${month.toFixed(2)} кг`;

  if(eat < 1200){
    text += "\n\n⚠️ Очень мало калорий. Долго так держать опасно.";
  }

  if(deficit < 0){
    text += "\n\nТы не в дефиците, а в профиците.";
  }

  document.getElementById("calcResult").textContent = text;
}

async function sendMessage(){
  if(!OPENROUTER_API_KEY || OPENROUTER_API_KEY === "ВСТАВЬ_СЮДА_API_KEY"){
    alert("Сначала вставь API key в код файла");
    return;
  }

  const text = document.getElementById("userText").value.trim();
  const file = document.getElementById("photo").files[0];

  if(!text && !file){
    alert("Напиши сообщение или выбери фото");
    return;
  }

  addMessage("user", text || "Фото еды");

  const userContent = [];
  userContent.push({
    type:"text",
    text: text || "Оцени еду на фото: калории, белки, жиры, углеводы."
  });

  if(file){
    const base64 = await toBase64(file);

    userContent.push({
      type:"image_url",
      image_url:{url:base64}
    });

    const img = document.createElement("img");
    img.src = base64;
    img.className = "preview";

    const userMsgs = document.querySelectorAll(".msg.user");
    const lastUserMsg = userMsgs[userMsgs.length - 1];

    if(lastUserMsg){
      lastUserMsg.appendChild(img);
    }
  }

  chatHistory.push({
    role:"user",
    content:userContent
  });

  document.getElementById("userText").value = "";
  document.getElementById("photo").value = "";

  addMessage("ai", "Думаю...");

  try{
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer " + OPENROUTER_API_KEY,
        "Content-Type":"application/json",
        "HTTP-Referer": location.href,
        "X-Title": "Food AI Chat"
      },
      body:JSON.stringify({
        model:MODEL,
        messages:chatHistory
      })
    });

    const data = await response.json();
    removeThinking();

    if(data.error){
      addMessage("ai", "Ошибка: " + data.error.message);
      return;
    }

    if(!data.choices || !data.choices[0]){
      addMessage("ai", "Ошибка: модель не вернула ответ");
      return;
    }

    const answer = data.choices[0].message.content;

    chatHistory.push({
      role:"assistant",
      content:answer
    });

    addMessage("ai", answer);

  }catch(err){
    removeThinking();
    addMessage("ai", "Ошибка: " + err.message);
  }
}

function addMessage(type,text){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + (type === "user" ? "user" : "ai");
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking(){
  const msgs = document.querySelectorAll(".msg.ai");
  for(let i = msgs.length - 1; i >= 0; i--){
    if(msgs[i].textContent === "Думаю..."){
      msgs[i].remove();
      return;
    }
  }
}

function clearChat(){
  chatHistory = [
    {
      role:"system",
      content:
`Ты Food AI помощник.
Ты помогаешь считать калории, белки, жиры, углеводы по фото и по описанию.
Отвечай по-русски, кратко, понятно.
Если оцениваешь еду по фото, всегда говори, что это примерная оценка.
Не поддерживай опасные голодовки, экстремальные диеты и питание ниже безопасного уровня.`
    }
  ];

  document.getElementById("chat").innerHTML =
    `<div class="msg ai">Чат очищен. Можешь скинуть фото еды или написать вопрос.</div>`;
}

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = err=>reject(err);
  });
}
</script>
</body>
</html>
