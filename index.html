<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калории и Food AI</title>
<style>
*{box-sizing:border-box}
body{
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  margin:0;
  padding:18px;
}
.wrap{
  max-width:520px;
  margin:0 auto;
}
.card{
  background:#1d1d1d;
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
}
h1,h2{margin-top:0}
input,select,button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border:0;
  border-radius:14px;
  font-size:16px;
}
button{
  background:#7c5cff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:active{transform:scale(.99)}
img{
  max-width:100%;
  border-radius:14px;
  margin-top:12px;
}
.result{
  background:#2a2a2a;
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
  line-height:1.45;
}
.small{
  color:#aaa;
  font-size:13px;
  line-height:1.4;
}
.warn{
  color:#ffcc66;
}
</style>
</head>
<body>

<div class="wrap">

<h1>🔥 Калории и дефицит</h1>

<div class="card">
  <h2>Твои данные</h2>

  <input id="age" type="number" placeholder="Возраст">
  <input id="height" type="number" placeholder="Рост, см">
  <input id="weight" type="number" placeholder="Вес, кг">

  <select id="gender">
    <option value="male">Парень</option>
    <option value="female">Девушка</option>
  </select>

  <select id="activity">
    <option value="1.2">Мало активности</option>
    <option value="1.375">Лёгкая активность</option>
    <option value="1.55">Средняя активность</option>
    <option value="1.725">Высокая активность</option>
  </select>

  <input id="eat" type="number" placeholder="Сколько ккал хочешь есть в день">

  <button onclick="calc()">Посчитать</button>

  <div id="calcResult" class="result">Заполни данные и нажми кнопку</div>
</div>

<div class="card">
  <h2>📸 Фото еды</h2>

  <p class="small">
    API key вставляется в коде файла, не на сайте.
  </p>

  <input id="photo" type="file" accept="image/*">

  <button onclick="analyzeFood()">Узнать калории по фото</button>

  <img id="preview">

  <div id="foodResult" class="result">Загрузи фото еды</div>
</div>

</div>

<script>

// ВСТАВЬ СЮДА СВОЙ OPENROUTER API KEY
// Пример: const OPENROUTER_API_KEY = "sk-or-v1-xxxxxxxx";
const OPENROUTER_API_KEY = "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";

// Модель можно поменять, если эта не работает
const MODEL = "qwen/qwen2.5-vl-32b-instruct:free";

function calc(){
  const age = Number(document.getElementById("age").value);
  const h = Number(document.getElementById("height").value);
  const w = Number(document.getElementById("weight").value);
  const gender = document.getElementById("gender").value;
  const act = Number(document.getElementById("activity").value);
  const eat = Number(document.getElementById("eat").value);

  if(!age || !h || !w || !eat){
    alert("Заполни возраст, рост, вес и калории");
    return;
  }

  const bmr = gender === "male"
    ? 10*w + 6.25*h - 5*age + 5
    : 10*w + 6.25*h - 5*age - 161;

  const norm = bmr * act;
  const deficit = norm - eat;
  const fatPerWeek = deficit * 7 / 7700;
  const fatPerMonth = deficit * 30 / 7700;

  let text =
`Базовый обмен: ${Math.round(bmr)} ккал
Норма с активностью: ${Math.round(norm)} ккал

Ты хочешь есть: ${eat} ккал
Дефицит: ${Math.round(deficit)} ккал/день

Примерно жира:
За неделю: ${fatPerWeek.toFixed(2)} кг
За месяц: ${fatPerMonth.toFixed(2)} кг`;

  if(deficit < 0){
    text += "\n\nТы не в дефиците, а в профиците.";
  }

  if(eat < 1200){
    text += "\n\n⚠️ Очень мало калорий. Долго так держать опасно.";
  }

  document.getElementById("calcResult").textContent = text;
}

document.getElementById("photo").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    document.getElementById("preview").src = URL.createObjectURL(file);
  }
});

async function analyzeFood(){
  const file = document.getElementById("photo").files[0];

  if(!file){
    alert("Выбери фото еды");
    return;
  }

  if(OPENROUTER_API_KEY === "ВСТАВЬ_СЮДА_API_KEY"){
    alert("Сначала вставь API key в код файла");
    return;
  }

  document.getElementById("foodResult").textContent = "Анализирую...";

  try{
    const base64 = await toBase64(file);

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer " + OPENROUTER_API_KEY,
        "Content-Type":"application/json",
        "HTTP-Referer": window.location.href,
        "X-Title": "Food AI Calorie Counter"
      },
      body:JSON.stringify({
        model:MODEL,
        messages:[
          {
            role:"user",
            content:[
              {
                type:"text",
                text:
`Ты анализируешь фото еды. Ответь по-русски кратко и честно.
Дай:
1. что на фото
2. примерный вес порции
3. калории
4. белки/жиры/углеводы
5. насколько оценка точная

Если фото не еда — так и скажи.`
              },
              {
                type:"image_url",
                image_url:{url:base64}
              }
            ]
          }
        ]
      })
    });

    const data = await response.json();

    if(data.error){
      document.getElementById("foodResult").textContent =
        "Ошибка: " + data.error.message;
      return;
    }

    if(!data.choices || !data.choices[0]){
      document.getElementById("foodResult").textContent =
        "Ошибка: модель не вернула ответ";
      return;
    }

    document.getElementById("foodResult").textContent =
      data.choices[0].message.content;

  }catch(err){
    document.getElementById("foodResult").textContent =
      "Ошибка: " + err.message;
  }
}

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = error=>reject(error);
  });
}
</script>

</body>
</html>
