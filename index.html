<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food AI</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  padding:20px;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

.wrap{
  max-width:520px;
  margin:auto;
}

.card{
  background:#1d1d1d;
  padding:20px;
  border-radius:22px;
  margin-bottom:16px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

button{
  background:#7c5cff;
  color:white;
  font-weight:bold;
}

.result{
  margin-top:15px;
  background:#2a2a2a;
  padding:14px;
  border-radius:14px;
  white-space:pre-wrap;
  line-height:1.45;
}

img{
  width:100%;
  border-radius:14px;
  margin-top:14px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h1>🔥 Калории и дефицит</h1>

<input id="age" type="number" placeholder="Возраст">
<input id="height" type="number" placeholder="Рост">
<input id="weight" type="number" placeholder="Вес">

<select id="gender">
<option value="male">Парень</option>
<option value="female">Девушка</option>
</select>

<select id="activity">
<option value="1.2">Мало активности</option>
<option value="1.375">Лёгкая активность</option>
<option value="1.55">Средняя активность</option>
<option value="1.725">Высокая активность</option>
</select>

<input id="eat" type="number" placeholder="Сколько ккал хочешь есть">

<button onclick="calc()">Посчитать</button>

<div id="calcResult" class="result">
Заполни данные
</div>

</div>

<div class="card">

<h1>📸 Food AI</h1>

<input id="photo" type="file" accept="image/*">

<button onclick="analyzeFood()">Узнать калории</button>

<img id="preview">

<div id="foodResult" class="result">
Загрузи фото еды
</div>

</div>

</div>

<script>

// 🔑 ВСТАВЬ СЮДА СВОЙ OPENROUTER API KEY
// Пример: const OPENROUTER_API_KEY = "sk-or-v1-xxxxxxxx";
const OPENROUTER_API_KEY = "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";

// Рабочая стабильная модель
const MODEL = "openai/gpt-4o-mini";

function calc(){

  const age = +document.getElementById("age").value;
  const h = +document.getElementById("height").value;
  const w = +document.getElementById("weight").value;
  const gender = document.getElementById("gender").value;
  const act = +document.getElementById("activity").value;
  const eat = +document.getElementById("eat").value;

  if(!age || !h || !w || !eat){
    alert("Заполни все поля");
    return;
  }

  const bmr = gender === "male"
  ? 10*w + 6.25*h - 5*age + 5
  : 10*w + 6.25*h - 5*age - 161;

  const norm = bmr * act;
  const deficit = norm - eat;

  const week = deficit * 7 / 7700;
  const month = deficit * 30 / 7700;

  let text =
`Базовый обмен: ${Math.round(bmr)} ккал

Норма: ${Math.round(norm)} ккал

Ты ешь: ${eat} ккал

Дефицит: ${Math.round(deficit)} ккал/день

Примерно жира:
За неделю: ${week.toFixed(2)} кг
За месяц: ${month.toFixed(2)} кг`;

  if(eat < 1200){
    text += "\n\n⚠️ Очень мало калорий. Долго так держать опасно.";
  }

  if(deficit < 0){
    text += "\n\nТы не в дефиците, а в профиците.";
  }

  document.getElementById("calcResult").textContent = text;

}

document.getElementById("photo")
.addEventListener("change",e=>{

  const file = e.target.files[0];

  if(file){
    document.getElementById("preview").src =
      URL.createObjectURL(file);
  }

});

async function analyzeFood(){

  if(
    !OPENROUTER_API_KEY ||
    OPENROUTER_API_KEY === "ВСТАВЬ_СЮДА_СВОЙ_API_KEY"
  ){
    alert("Сначала вставь OpenRouter API key в код файла");
    return;
  }

  const file =
    document.getElementById("photo").files[0];

  if(!file){
    alert("Выбери фото");
    return;
  }

  document.getElementById("foodResult").textContent =
    "Анализирую...";

  try{

    const base64 = await toBase64(file);

    const response = await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        method:"POST",
        headers:{
          "Authorization":"Bearer "+OPENROUTER_API_KEY,
          "Content-Type":"application/json",
          "HTTP-Referer": location.href,
          "X-Title": "Food AI"
        },
        body:JSON.stringify({
          model:MODEL,
          messages:[
            {
              role:"user",
              content:[
                {
                  type:"text",
                  text:
`Определи еду на фото.
Напиши:
- что это
- примерный вес порции
- калории
- белки
- жиры
- углеводы

Ответь по-русски кратко.
Если не уверен — напиши диапазон.`
                },
                {
                  type:"image_url",
                  image_url:{
                    url:base64
                  }
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();

    if(data.error){

      document.getElementById("foodResult")
      .textContent =
      "Ошибка: " + data.error.message;

      return;
    }

    if(!data.choices || !data.choices[0]){
      document.getElementById("foodResult")
      .textContent =
      "Ошибка: модель не вернула ответ";
      return;
    }

    document.getElementById("foodResult")
    .textContent =
    data.choices[0].message.content;

  }catch(err){

    document.getElementById("foodResult")
    .textContent =
    "Ошибка: " + err.message;

  }

}

function toBase64(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = ()=>resolve(reader.result);

    reader.onerror = err=>reject(err);

  });

}

</script>

</body>
</html>
